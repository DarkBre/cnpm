services:
  mysql:
    image: mysql:8.0
    container_name: homestaybooking-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "123456"
      MYSQL_DATABASE: homestaybooking
      TZ: Asia/Bangkok
    ports:
      - "3307:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+07:00
    volumes:
      - homestaybooking_mysql_data:/var/lib/mysql
      - ./database/migrate.sql:/docker-entrypoint-initdb.d/01-migrate.sql:ro
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p123456"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  homestaybooking_mysql_data:
